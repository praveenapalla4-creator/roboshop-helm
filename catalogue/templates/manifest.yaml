

apiVersion: v1
kind: ConfigMap
metadata:
   name: catalogue
   namespace: roboshop
data:
  MONGO: "true" 
  MONGO_URL:  {{. Values.configmap.mongoURl }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  # these are replica set labels
  labels:
    project: roboshop
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    # these labels are used to select pods
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
  # pod definition
  template:
    metadata:
      labels:
        project: roboshop
        component: catalogue
        tier: backend
    spec:
      containers:
      - name: catalogue
        image: "{{.Values.deployment.imageRepo }}: {{ .Values.deployment.imageVersion }}"
        imagePullPolicy: Always
        envFrom: 
        - configMapRef:
             name: catalogue
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
            httpGet:
              path: /health
              port: liveness-port
            failureThreshold: 10
            periodSeconds: 10

        livenessProbe:
          httpGet:
              path: /health
              port: liveness-port
          failureThreshold: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  type: {{.Values.service.type. }}
  selector:
    project: roboshop
    component: catalogue
    tier: backend
  ports: 
     - protocol: TCP
       port: 8080 # service port
       targetPort: 8080 # container port
